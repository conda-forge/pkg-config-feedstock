schema_version: 1

context:
  version: 0.29.2

package:
  name: pkg-config
  version: ${{ version }}

source:
  url: https://pkg-config.freedesktop.org/releases/pkg-config-${{ version }}.tar.gz
  sha256: 6fc69c01688c9458a57eb9a1664c9aba372ccda420a02bf4429fe610e7e7d591

build:
  number: 1010
  skip: win and vc<14
  prefix_detection:
    ignore_binary_files: true

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: unix
      then:
      - libtool
      - automake 1.15.*
      - make
      - python >=2.5
  host:
    # To avoid a cyclic dependency when building, we avoid glib when not cross-compiling
    # This assumes that both pkg-config and glib are cross-compiled or neither is
    - if: win or (build_platform != target_platform)
      then: glib
    - if: osx
      then: libiconv

tests:
  - script:
      - pkg-config --help

about:
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: Interface for querying installed libraries for use during compilation.
  description: |
    pkg-config is a script to make putting together all the build
    flags when compiling/linking a lot easier.
  homepage: http://www.freedesktop.org/wiki/Software/pkg-config/
  repository: https://cgit.freedesktop.org/pkg-config
  documentation: https://people.freedesktop.org/~dbn/pkg-config-guide.html

extra:
  recipe-maintainers:
    - jakirkham
    - mdboom
    - ocefpaf
    - tacaswell
    - mingwandroid
